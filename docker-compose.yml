
networks:
  crumbskate-network:
    driver: bridge

volumes:
  backend_uploads:
    driver: local

services:
  # ============ BACKEND (API) ============
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: ${NODE_ENV:-production}
    container_name: crumbskate-backend
    restart: unless-stopped
    networks:
      - crumbskate-network
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${BACKEND_PORT:-5000}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-crumbskate_secret_key_2024_change_this_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      FRONTEND_URL: ${FRONTEND_URL:-https://crumbskate.edu.ar}
    ports:
      - "${BACKEND_PORT:-5000}:${BACKEND_PORT:-5000}"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${BACKEND_PORT:-5000}/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============ FRONTEND ============
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://crumbskate.edu.ar/api}
        NODE_ENV: ${NODE_ENV:-production}
    container_name: crumbskate-frontend
    restart: unless-stopped
    networks:
      - crumbskate-network
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============ CERTBOT PARA SSL AUTOMÁTICO ============
  certbot:
    image: certbot/certbot
    container_name: crumbskate-certbot
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
      - /var/run/docker.sock:/var/run/docker.sock:ro
    entrypoint: /bin/sh -c 'trap exit SIGINT; certbot renew -q; sleep infinity'
    depends_on:
      - frontend
